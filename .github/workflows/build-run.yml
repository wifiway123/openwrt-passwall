# Description: Precise Packaging with Official Xray & Fork Versioning

name: "Auto compile the run"
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if version matches'
        required: false
        default: 'false'
        type: boolean

env:
  TZ: Asia/Shanghai
  passwall: ${{ github.repository }}
  packages: Openwrt-Passwall/openwrt-passwall-packages
  # 编译用列表 (注意包含 v2ray-geodata 以生成 geoip 和 geosite)
  PKGS_COMPILE: "chinadns-ng dns2socks geoview hysteria ipt2socks microsocks naiveproxy shadow-tls shadowsocks-rust shadowsocksr-libev simple-obfs sing-box tcping trojan-plus tuic-client v2ray-plugin xray-plugin v2ray-geodata"
  # 提取到压缩包的精准列表 (图片中指定的依赖)
  PKGS_EXTRACT: "chinadns-ng dns2socks geoview hysteria ipt2socks microsocks naiveproxy shadow-tls shadowsocks-rust shadowsocksr-libev simple-obfs sing-box tcping trojan-plus tuic-client v2ray-plugin xray-plugin v2ray-geoip v2ray-geosite"
  # .run 核心组件列表
  PKGS_RUN: "chinadns-ng dns2socks microsocks tcping luci-app-passwall luci-i18n-passwall-zh-cn"

permissions:
  contents: write
  actions: write

jobs:
  job_check:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      latest_version: ${{ steps.check.outputs.latest_version }}
      has_update: ${{ steps.check.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Check version
        id: check
        run: |
          cd luci-app-passwall
          local_ver=$(awk -F ':=' '/^PKG_VERSION:=|^PKG_RELEASE:=/ {print $2}' Makefile | sed ':a;N;s/\$(PKG_VERSION)-//;s/\n$//;s/\n/-/;ba')
          # 加上 -fork 后缀
          fork_ver="${local_ver}-fork"
          remote_ver=$(wget -qO- -t1 -T2 https://api.github.com/repos/${{ env.passwall }}/releases/latest | jq -r '.tag_name')
          
          echo "latest_version=${fork_ver}" >> $GITHUB_OUTPUT
          
          if [[ "${{ github.event.inputs.force_build }}" == "true" || "$local_ver" != "$remote_ver" ]]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

  job_build:
    name: Build [${{ matrix.ver_name }}]
    needs: job_check
    if: needs.job_check.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: aarch64_cortex-a53
            xray_arch: arm64-v8a
            url_sdk: https://archive.openwrt.org/releases/21.02.7/targets/mvebu/cortexa53/openwrt-sdk-21.02.7-mvebu-cortexa53_gcc-8.4.0_musl.Linux-x86_64.tar.xz
            ver_name: "22.03-"
          - platform: aarch64_cortex-a53
            xray_arch: arm64-v8a
            url_sdk: https://downloads.openwrt.org/releases/24.10.4/targets/mvebu/cortexa53/openwrt-sdk-24.10.4-mvebu-cortexa53_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            ver_name: "23.05-24.10"

    steps:
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential git wget zip zstd

      - name: Fetch Official Xray Binary
        run: |
          XRAY_TAG=$(wget -qO- https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r '.tag_name')
          wget -q https://github.com/XTLS/Xray-core/releases/download/${XRAY_TAG}/Xray-linux-${{ matrix.xray_arch }}.zip
          mkdir -p xray_bin && unzip *.zip -d xray_bin
          # 立即删除官方原始压缩包，防止误传到 release
          rm -f *.zip
          echo "XRAY_VER=${XRAY_TAG}" >> $GITHUB_ENV

      - name: Create Dummy xray-core IPK
        run: |
          mkdir -p dummy/CONTROL
          cat > dummy/CONTROL/control << EOF
          Package: xray-core
          Version: ${{ env.XRAY_VER }}
          Architecture: all
          Maintainer: Xray-Official
          Description: Dummy package for PassWall
          EOF
          tar -C dummy -czf data.tar.gz .
          tar -C dummy/CONTROL -czf control.tar.gz .
          echo "2.0" > debian-binary
          ar r xray-core-dummy.ipk debian-binary control.tar.gz data.tar.gz
          mkdir -p final_dummy && mv xray-core-dummy.ipk final_dummy/

      - name: Setup SDK & Compile
        run: |
          wget ${{ matrix.url_sdk }} -O sdk_file
          mkdir sdk && ( [[ "${{ matrix.url_sdk }}" == *.tar.xz ]] && tar -xJf sdk_file -C ./sdk --strip-components=1 || tar --zstd -x -f sdk_file -C ./sdk --strip-components=1 )
          cd sdk
          sed -i 's|git.openwrt.org/feed|github.com/openwrt|g' feeds.conf.default
          echo "src-git passwall_packages https://github.com/${{ env.packages }}.git;main" >> feeds.conf.default
          echo "src-git passwall https://github.com/openwrt-passwall/openwrt-passwall.git;main" >> feeds.conf.default
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_luci-app-passwall=m" > .config
          echo "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=m" >> .config
          echo "CONFIG_PACKAGE_luci-compat=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-ipkg=y" >> .config
          for p in ${{ env.PKGS_COMPILE }}; do echo "CONFIG_PACKAGE_$p=m" >> .config; done
          make defconfig
          for p in luci-app-passwall ${{ env.PKGS_COMPILE }}; do
            make package/$p/compile -j$(nproc) V=s || echo "::warning::Package $p failed"
          done

      - name: Organize Files
        id: organize
        run: |
          mkdir -p out/zip_ipks out/run_ipks
          
          # 1. 严格按照图片列表提取特定 IPK 到 zip 文件夹
          for p in luci-app-passwall luci-i18n-passwall-zh-cn ${{ env.PKGS_EXTRACT }}; do
            find sdk/bin/packages/ -name "$p*.ipk" -exec cp {} out/zip_ipks/ \;
          done
          
          # 2. 将 dummy 版本的 xray-core 也加入压缩包备用
          cp final_dummy/*.ipk out/zip_ipks/
          
          # 3. 筛选核心包到 .run 文件夹
          for p in ${{ env.PKGS_RUN }}; do
            cp out/zip_ipks/$p*.ipk out/run_ipks/ 2>/dev/null || true
          done
          cp final_dummy/*.ipk out/run_ipks/
          cp xray_bin/xray out/run_ipks/xray_binary
          
          # 4. 只为主程序和语言包重命名加前缀
          for f in out/zip_ipks/luci-*.ipk out/run_ipks/luci-*.ipk; do
            [ -f "$f" ] && mv "$f" "$(dirname $f)/${{ matrix.ver_name }}$(basename $f)"
          done

      - name: Create .run Installer
        run: |
          cat > install.sh << 'EOF'
          #!/bin/sh
          set -e
          echo "Deploying PassWall + Official Xray (${{ matrix.ver_name }})"
          line=$(grep -anm 1 "^__TARFILE_FOLLOWS__" "$0" | cut -d: -f1)
          tail -n +$((line + 1)) "$0" | tar xzv
          opkg update && opkg install ./packages/*.ipk
          if [ -f "./packages/xray_binary" ]; then
              mv -f ./packages/xray_binary /usr/bin/xray
              chmod +x /usr/bin/xray
              LIST_FILE="/usr/lib/opkg/info/xray-core.list"
              [ -f "$LIST_FILE" ] && (grep -q "/usr/bin/xray" "$LIST_FILE" || echo "/usr/bin/xray" >> "$LIST_FILE")
          fi
          rm -rf ./packages
          exit 0
          __TARFILE_FOLLOWS__
          EOF
          chmod +x install.sh
          
          mkdir -p packages && cp out/run_ipks/* packages/
          tar czf packages.tar.gz -C packages .
          cat install.sh packages.tar.gz > passwall_${{ matrix.ver_name }}${{ matrix.platform }}.run
          
          # 仅打包精准提取的依赖
          zip -rj passwall_all_pkgs_${{ matrix.ver_name }}${{ matrix.platform }}.zip out/zip_ipks/*

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.job_check.outputs.latest_version }}
          files: |
            *.run
            passwall_all_pkgs_*.zip
